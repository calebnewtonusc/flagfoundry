version: "3.9"

services:
  model:
    image: vllm/vllm-openai:latest
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=0,1
      - VLLM_API_KEY=${VLLM_API_KEY:-flagfoundry_key}
    volumes:
      - ${MODEL_PATH:-./checkpoints/flagfoundry-final}:/model:ro
    command: >
      --model /model
      --tensor-parallel-size 2
      --port 9000
      --api-key ${VLLM_API_KEY:-flagfoundry_key}
      --max-model-len 4096
    ports:
      - "9000:9000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build: .
    environment:
      - MODEL_PATH=/model
      - VLLM_URL=http://model:9000
      - API_SECRET_KEY=${API_SECRET_KEY:-change_me}
    volumes:
      - ${MODEL_PATH:-./checkpoints/flagfoundry-final}:/model:ro
    ports:
      - "8080:8080"
    depends_on:
      model:
        condition: service_healthy
    command: uvicorn deploy.api_server:app --host 0.0.0.0 --port 8080

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api

  # Sandbox network for challenge containers
  # Challenges run in: docker network create flagfoundry_challenges
  sandbox_init:
    image: docker:cli
    command: sh -c "docker network create flagfoundry_challenges 2>/dev/null || true"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  redis_data:

networks:
  default:
    name: flagfoundry_main
