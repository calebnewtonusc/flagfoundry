# Stage 2: GRPO config — FlagFoundry
# Run: deepspeed --num_gpus=10 training/train_rl.py

model:
  base_model: "Qwen/Qwen2.5-Coder-7B-Instruct"
  sft_adapter: "./checkpoints/sft"
  output_dir: "./checkpoints/rl"

grpo:
  learning_rate: 5.0e-6
  num_train_epochs: 1
  per_device_train_batch_size: 1
  gradient_accumulation_steps: 8
  num_generations: 8
  bf16: true
  gradient_checkpointing: true

reward:
  docker_image: "ctf-sandbox:latest"
  sandbox_timeout: 30
  flag_verify_sha256: true
  reward_correct_flag: 1.0
  reward_partial_exploit: 0.3
  reward_timeout: -0.5
  reward_error: -1.0

logging:
  logging_steps: 10
  save_steps: 100
  run_name: "flagfoundry-grpo-v1"

data:
  rl_tasks_path: "./data/rl/ctf_sandbox_tasks.jsonl"
